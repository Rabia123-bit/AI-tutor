<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Evaluation Form</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .page {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 24px;
        }

        h1 {
            margin-top: 0;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input, select, textarea, button {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 15px;
            box-sizing: border-box;
        }

        button {
            background: #1f2937;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #111827;
        }

        #message {
            margin-top: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Module Evaluation Form</h1>
            <p>Please evaluate the module you used.</p>

            <form id="evaluationForm">
                {% csrf_token %}

                <div class="field">
                    <label for="evaluator_name">Student Name</label>
                    <input
                        type="text"
                        id="evaluator_name"
                        name="evaluator_name"
                        value="{{ evaluator_name|default:'' }}"
                        required
                    >
                </div>

                <div class="field">
                    <label for="evaluated_module">Module Evaluated</label>
                    <select id="evaluated_module" name="evaluated_module" required>
                        <option value="">Select Module</option>
                        <option value="theory" {% if selected_module == "theory" %}selected{% endif %}>Theory Module</option>
                        <option value="practical" {% if selected_module == "practical" %}selected{% endif %}>Practical Module</option>
                    </select>
                </div>

                <div class="field">
                    <label for="q1_complete_explanations">1. The tutor provided complete explanations (1–5)</label>
                    <select id="q1_complete_explanations" name="q1_complete_explanations" required>
                        <option value="">Select</option>
                        <option value="1">1 - Strongly disagree</option>
                        <option value="2">2 - Disagree</option>
                        <option value="3">3 - Neutral</option>
                        <option value="4">4 - Agree</option>
                        <option value="5">5 - Strongly agree</option>
                    </select>
                </div>

                <div class="field">
                    <label for="q2_improves_understanding">2. The tutor improved my understanding of the topic (1–5)</label>
                    <select id="q2_improves_understanding" name="q2_improves_understanding" required>
                        <option value="">Select</option>
                        <option value="1">1 - Strongly disagree</option>
                        <option value="2">2 - Disagree</option>
                        <option value="3">3 - Neutral</option>
                        <option value="4">4 - Agree</option>
                        <option value="5">5 - Strongly agree</option>
                    </select>
                </div>

                <div class="field">
                    <label for="q3_quiz_consistency">3. The quiz questions were consistent with the tutor explanation (1–5)</label>
                    <select id="q3_quiz_consistency" name="q3_quiz_consistency" required>
                        <option value="">Select</option>
                        <option value="1">1 - Strongly disagree</option>
                        <option value="2">2 - Disagree</option>
                        <option value="3">3 - Neutral</option>
                        <option value="4">4 - Agree</option>
                        <option value="5">5 - Strongly agree</option>
                    </select>
                </div>

                <div class="field">
                    <label for="q4_response_reliability">4. The tutor responses seemed reliable and correct (1–5)</label>
                    <select id="q4_response_reliability" name="q4_response_reliability" required>
                        <option value="">Select</option>
                        <option value="1">1 - Strongly disagree</option>
                        <option value="2">2 - Disagree</option>
                        <option value="3">3 - Neutral</option>
                        <option value="4">4 - Agree</option>
                        <option value="5">5 - Strongly agree</option>
                    </select>
                </div>

                <div class="field">
                    <label for="q5_useful_for_learning">5. The tutor was useful for learning Business Intelligence concepts (1–5)</label>
                    <select id="q5_useful_for_learning" name="q5_useful_for_learning" required>
                        <option value="">Select</option>
                        <option value="1">1 - Strongly disagree</option>
                        <option value="2">2 - Disagree</option>
                        <option value="3">3 - Neutral</option>
                        <option value="4">4 - Agree</option>
                        <option value="5">5 - Strongly agree</option>
                    </select>
                </div>

                <div class="field">
                    <label for="q6_increases_motivation">6. The tutor increased my motivation to learn (1–5)</label>
                    <select id="q6_increases_motivation" name="q6_increases_motivation" required>
                        <option value="">Select</option>
                        <option value="1">1 - Strongly disagree</option>
                        <option value="2">2 - Disagree</option>
                        <option value="3">3 - Neutral</option>
                        <option value="4">4 - Agree</option>
                        <option value="5">5 - Strongly agree</option>
                    </select>
                </div>

                <div class="field">
                    <label for="q7_overall_satisfaction">7. Overall, I am satisfied with this module (1–5)</label>
                    <select id="q7_overall_satisfaction" name="q7_overall_satisfaction" required>
                        <option value="">Select</option>
                        <option value="1">1 - Strongly disagree</option>
                        <option value="2">2 - Disagree</option>
                        <option value="3">3 - Neutral</option>
                        <option value="4">4 - Agree</option>
                        <option value="5">5 - Strongly agree</option>
                    </select>
                </div>

                <div class="field">
                    <label for="comments">Comments (optional)</label>
                    <textarea id="comments" name="comments" rows="4"></textarea>
                </div>

                <button type="submit">Submit Evaluation</button>
            </form>

            <div id="message"></div>
        </div>
    </div>

    <script>
        const evaluationForm = document.getElementById("evaluationForm");
        const message = document.getElementById("message");

        evaluationForm.addEventListener("submit", async function(e) {
            e.preventDefault();

            const formData = new FormData(evaluationForm);

            const res = await fetch("{% url 'save_tutor_evaluation' %}", {
                method: "POST",
                body: formData,
                headers: {
                    "X-CSRFToken": formData.get("csrfmiddlewaretoken")
                }
            });

            const data = await res.json();

            if (data.error) {
                message.textContent = data.error;
                message.style.color = "red";
                return;
            }

            message.textContent = data.message;
            message.style.color = "green";
            evaluationForm.reset();
        });
    </script>
</body>
</html>
